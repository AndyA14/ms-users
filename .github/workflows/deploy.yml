name: Deploy ms-users (Account 1)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        default: "apply"
        type: choice
        options: [apply, destroy]

jobs:
  # ── Paso 1: Build & Push imagen Docker ────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_IMAGE_NAME }}:latest

  # ── Paso 2: Terraform ──────────────────────────────────────────────────────
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    needs: docker

    env:
      TF_VAR_service_name:      ${{ secrets.SERVICE_NAME }}
      TF_VAR_port:              ${{ secrets.PORT }}
      TF_VAR_docker_username:   ${{ secrets.DOCKER_USERNAME }}
      TF_VAR_docker_password:   ${{ secrets.DOCKER_PASSWORD }}
      TF_VAR_image_name:        ${{ secrets.DOCKER_IMAGE_NAME }}
      TF_VAR_rabbitmq_host:     ${{ secrets.RABBITMQ_HOST }}
      TF_VAR_rabbitmq_user:     ${{ secrets.RABBITMQ_USER }}
      TF_VAR_rabbitmq_pass:     ${{ secrets.RABBITMQ_PASS }}
      TF_VAR_postgres_url:      ${{ secrets.POSTGRES_URL }}
      TF_VAR_mongo_url:         ${{ secrets.MONGO_URL }}
      TF_VAR_key_name:          ${{ secrets.KEY_NAME }}
      TF_VAR_instance_type:     "t2.micro"
      TF_VAR_region:            "us-east-1"

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_ACCOUNT1 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ACCOUNT1 }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN_ACCOUNT1 }}
          aws-region:            us-east-1

      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Apply
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: terraform apply -auto-approve
        working-directory: terraform

      # 🔴 Destroy SOLO si se dispara manualmente con action=destroy
      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
        working-directory: terraform
