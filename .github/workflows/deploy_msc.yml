name: 2. Deploy Microservice

on:
  workflow_dispatch

env:
  # 👇 CONFIGURAR EN CADA REPO
  SVC_NAME: "ms-users"
  PORT: "8001"
  IMAGE: "aceofglass14/ms-users:latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}        # IP del EC2 del microservicio
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}          # Contenido del PEM
          port: 443                            # Usa 22 si no aplicaste el firewall hack
          script: |
            # Login en Docker Hub
            echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

            # Detener y eliminar contenedor anterior si existe
            docker stop ${{ env.SVC_NAME }} || true
            docker rm ${{ env.SVC_NAME }} || true

            # Descargar imagen actualizada
            docker pull ${{ env.IMAGE }}

            # Ejecutar contenedor (OBLIGATORIO SEGÚN INSTRUCCIÓN)
            docker run -d \
              --name ${{ env.SVC_NAME }} \
              --restart always \
              -p ${{ env.PORT }}:${{ env.PORT }} \
              -e PORT=${{ env.PORT }} \
              -e RABBITMQ_HOST="${{ secrets.INFRA_IP }}" \
              -e POSTGRES_URL="postgresql://admin:admin123@${{ secrets.INFRA_IP }}:5432/appdb" \
              -e MONGO_URL="mongodb://${{ secrets.INFRA_IP }}:27017" \
              ${{ env.IMAGE }}
